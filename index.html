<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AirDraw">
<link rel="manifest" href="manifest.json">
<title>AirDraw — Beyond The Brush</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c28;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0ff;
  --muted: #6b6b8a;
  --accent: #ff2d78;
  --pink: #ff2d78;
  --yellow: #ffe94a;
  --blue: #2d8bff;
  --green: #2dff9a;
  --black: #111111;
  --white: #ffffff;
  --radius: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  overflow: hidden;
  height: 100dvh;
  width: 100dvw;
  user-select: none;
}

/* ─── SCREENS ─── */
.screen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; transition: opacity .4s, transform .4s; }
.screen.hidden { opacity:0; pointer-events:none; transform:scale(.97); }

/* ─── SPLASH ─── */
#splash {
  background: radial-gradient(ellipse at 30% 60%, rgba(255,45,120,.15) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(45,139,255,.12) 0%, transparent 55%),
              var(--bg);
}
.splash-logo { font-family:'Playfair Display',serif; font-size:clamp(2.5rem,8vw,5rem); font-style:italic; color:#fff; letter-spacing:-2px; margin-bottom:8px; }
.splash-logo span { color: var(--pink); }
.splash-sub { color: var(--muted); font-size:.75rem; letter-spacing:4px; text-transform:uppercase; margin-bottom:48px; }
.splash-btn {
  background: var(--pink); color:#fff; border:none; border-radius:40px;
  font-family:'Space Mono',monospace; font-size:1rem; font-weight:700;
  padding:18px 48px; cursor:pointer; letter-spacing:1px;
  box-shadow: 0 0 40px rgba(255,45,120,.4);
  transition: transform .15s, box-shadow .15s;
}
.splash-btn:hover { transform:scale(1.04); box-shadow:0 0 60px rgba(255,45,120,.6); }
.splash-hint { margin-top:24px; color:var(--muted); font-size:.7rem; text-align:center; line-height:1.8; }

/* ─── MAIN CANVAS SCREEN ─── */
#main { flex-direction:row; align-items:stretch; background:#000; }

#videoEl { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); opacity:0; }
#drawCanvas { position:absolute; inset:0; width:100%; height:100%; }
#handCanvas  { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
#templateCanvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; opacity:.18; }

/* ─── TOOLBAR ─── */
#toolbar {
  position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:10px;
  background: rgba(10,10,15,.85); backdrop-filter:blur(20px);
  border:1px solid var(--border); border-radius:40px; padding:10px 16px;
  z-index:100;
}
.tool-sep { width:1px; height:28px; background:var(--border); margin:0 4px; }

.color-btn {
  width:28px; height:28px; border-radius:50%; border:3px solid transparent;
  cursor:pointer; transition:transform .15s, border-color .15s;
  flex-shrink:0;
}
.color-btn.active { border-color:#fff; transform:scale(1.25); }
.color-btn:hover { transform:scale(1.1); }

.tool-btn {
  background:transparent; border:1px solid var(--border); border-radius:10px;
  color:var(--text); font-family:'Space Mono',monospace; font-size:.65rem;
  padding:6px 10px; cursor:pointer; transition:all .15s; white-space:nowrap;
}
.tool-btn.active { background:var(--pink); border-color:var(--pink); color:#fff; }
.tool-btn:hover:not(.active) { border-color:rgba(255,255,255,.3); }

.size-btn {
  width:22px; height:22px; border-radius:50%; background:rgba(255,255,255,.1);
  border:1px solid var(--border); cursor:pointer; color:var(--text);
  font-size:.7rem; display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.size-btn:hover { background:rgba(255,255,255,.2); }

/* ─── TOP HUD ─── */
#hud {
  position:absolute; top:16px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:12px;
  background:rgba(10,10,15,.8); backdrop-filter:blur(16px);
  border:1px solid var(--border); border-radius:30px; padding:8px 20px;
  z-index:100; font-size:.7rem; color:var(--muted);
}
#hud .status { color:var(--green); font-weight:700; }
#hud .mode-label { color:var(--yellow); }

/* ─── GESTURE INDICATOR ─── */
#gestureHint {
  position:absolute; top:80px; left:50%; transform:translateX(-50%);
  background:rgba(255,45,120,.15); border:1px solid rgba(255,45,120,.4);
  border-radius:20px; padding:8px 20px; font-size:.7rem; color:var(--pink);
  z-index:100; opacity:0; transition:opacity .3s; pointer-events:none;
}

/* ─── TOP RIGHT BUTTONS ─── */
#topRight {
  position:absolute; top:16px; right:16px; display:flex; gap:8px; z-index:100;
}
.icon-btn {
  width:40px; height:40px; border-radius:12px;
  background:rgba(10,10,15,.8); backdrop-filter:blur(16px);
  border:1px solid var(--border); color:var(--text);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; transition:all .15s;
}
.icon-btn:hover { border-color:var(--pink); color:var(--pink); }

/* ─── TEXT OVERLAY ─── */
#textLayer { position:absolute; inset:0; pointer-events:none; z-index:50; }
.text-item {
  position:absolute; color:#fff; font-size:28px; font-weight:700;
  cursor:grab; pointer-events:all; user-select:none;
  text-shadow: 2px 2px 8px rgba(0,0,0,.8);
  transition: outline .1s;
  white-space:nowrap;
}
.text-item.selected { outline: 2px dashed var(--yellow); outline-offset:4px; }
.text-item.editing { outline: 2px solid var(--pink); outline-offset:4px; background: rgba(10,10,15,.8); padding: 4px 8px; border-radius: 8px; }
.text-item.editing:focus { outline: 2px solid var(--pink); }

/* ─── SHAPE ITEMS ─── */
.shape-item {
  position:absolute; pointer-events:all; user-select:none;
  transition: outline .1s;
}
.shape-item.selected { outline: 2px dashed var(--yellow); outline-offset:4px; }

/* ─── TEXT CONTROLS ─── */
#textControls {
  position:absolute; top:80px; right:16px;
  background:rgba(10,10,15,.9); backdrop-filter:blur(16px);
  border:1px solid var(--border); border-radius:16px; padding:16px;
  z-index:200; display:none; flex-direction:column; gap:10px; min-width:200px;
}
#textControls.visible { display:flex; }

/* ─── SHAPE CONTROLS ─── */
#shapeControls {
  position:absolute; top:80px; right:16px;
  background:rgba(10,10,15,.9); backdrop-filter:blur(16px);
  border:1px solid var(--border); border-radius:16px; padding:16px;
  z-index:200; display:none; flex-direction:column; gap:10px; min-width:200px;
}
#shapeControls.visible { display:flex; }
.shape-btn.active { background:var(--pink); border-color:var(--pink); color:#fff; }
.shape-btn:hover:not(.active) { border-color:rgba(255,255,255,.3); }

/* ─── DONE EDITING BUTTON ─── */
#doneEditingBtn {
  position:absolute; display:none; z-index:300;
  background:var(--pink); color:#fff; border:none; border-radius:20px;
  font-family:'Space Mono',monospace; font-size:.7rem; font-weight:700;
  padding:8px 16px; cursor:pointer; pointer-events:all;
  box-shadow: 0 4px 12px rgba(255,45,120,.4);
  transition: transform .15s, box-shadow .15s;
}
#doneEditingBtn.visible { display:block; }
#doneEditingBtn:hover { transform:scale(1.05); box-shadow:0 6px 16px rgba(255,45,120,.6); }
#textInput {
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; color:#fff; font-family:'Space Mono',monospace;
  font-size:.85rem; padding:8px 12px; outline:none; width:100%;
}
#textInput:focus { border-color:var(--pink); }
#textColorRow { display:flex; gap:6px; }
.tc-color { width:20px; height:20px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:all .15s; }
.tc-color.active { border-color:#fff; transform:scale(1.2); }
.add-text-btn {
  background:var(--pink); color:#fff; border:none; border-radius:8px;
  font-family:'Space Mono',monospace; font-size:.75rem; padding:8px;
  cursor:pointer; font-weight:700;
}

/* ─── GALLERY SCREEN ─── */
#gallery {
  background: radial-gradient(ellipse at 70% 30%, rgba(45,139,255,.1) 0%, transparent 60%), var(--bg);
  padding:20px; overflow-y:auto; align-items:flex-start; justify-content:flex-start;
}
.gallery-header {
  width:100%; display:flex; align-items:center; justify-content:space-between;
  margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border);
}
.gallery-title { font-family:'Playfair Display',serif; font-size:1.8rem; font-style:italic; }
.back-btn {
  background:transparent; border:1px solid var(--border); border-radius:10px;
  color:var(--text); font-family:'Space Mono',monospace; font-size:.7rem;
  padding:8px 16px; cursor:pointer; transition:all .15s;
}
.back-btn:hover { border-color:var(--pink); color:var(--pink); }

.gallery-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
  gap:16px; width:100%;
}
.gallery-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden; transition:transform .2s, border-color .2s;
}
.gallery-card:hover { transform:translateY(-4px); border-color:rgba(255,45,120,.3); }
.gallery-thumb { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; }
.gallery-actions {
  padding:12px; display:flex; gap:6px; flex-wrap:wrap;
}
.dl-btn {
  flex:1; min-width:60px; background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:'Space Mono',monospace; font-size:.6rem;
  padding:6px 4px; cursor:pointer; text-align:center; transition:all .15s;
}
.dl-btn:hover { background:var(--pink); border-color:var(--pink); color:#fff; }
.dl-btn.pdf { --accent-c: var(--pink); }
.dl-btn.pptx { --accent-c: var(--yellow); }
.load-btn {
  flex:1; min-width:60px; background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:'Space Mono',monospace; font-size:.6rem;
  padding:6px 4px; cursor:pointer; text-align:center; transition:all .15s;
}
.load-btn:hover { background:var(--green); border-color:var(--green); color:#fff; }
.gallery-empty {
  width:100%; text-align:center; color:var(--muted); padding:80px 0; font-size:.85rem;
  grid-column: 1/-1;
}

/* ─── LOADING OVERLAY ─── */
#loading {
  position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(10px);
  z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; opacity:0; pointer-events:none; transition:opacity .3s;
}
#loading.visible { opacity:1; pointer-events:all; }
.spinner {
  width:40px; height:40px; border:3px solid var(--border);
  border-top-color:var(--pink); border-radius:50%; animation:spin 1s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { color:var(--muted); font-size:.75rem; }

/* ─── TOAST ─── */
#toast {
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
  background:rgba(255,45,120,.9); color:#fff; font-size:.75rem;
  padding:10px 24px; border-radius:30px; z-index:9999;
  opacity:0; transition:opacity .3s; pointer-events:none;
}

/* ─── SAVE FLASH ─── */
#saveFlash {
  position:fixed; inset:0; background:rgba(255,255,255,.3); z-index:9998;
  opacity:0; pointer-events:none; transition:opacity .15s;
}

/* ─── CURSOR DOT ─── */
#cursorDot {
  position:absolute; width:12px; height:12px; border-radius:50%;
  background:var(--pink); pointer-events:none; z-index:500;
  transform:translate(-50%,-50%); transition:width .1s, height .1s, background .1s;
  box-shadow: 0 0 12px currentColor;
  display:none;
}

/* ─── ERASER RING ─── */
#eraserRing {
  position:absolute; pointer-events:none; z-index:499;
  transform:translate(-50%,-50%);
  display:none;
  border-radius:50%;
  border: 3px dashed rgba(255,255,255,0.85);
  box-shadow: 0 0 0 2px rgba(0,0,0,0.5), inset 0 0 0 2px rgba(0,0,0,0.3);
  animation: eraserPulse 1s ease-in-out infinite;
}
@keyframes eraserPulse {
  0%,100% { border-color: rgba(255,255,255,0.85); box-shadow: 0 0 0 2px rgba(0,0,0,.5), 0 0 16px rgba(255,255,255,.3); }
  50%      { border-color: rgba(255,200,200,1);    box-shadow: 0 0 0 2px rgba(0,0,0,.5), 0 0 28px rgba(255,100,100,.5); }
}

/* ─── ERASE FLASH ─── */
#eraseFlash {
  position:absolute; border-radius:50%; pointer-events:none; z-index:498;
  transform:translate(-50%,-50%); background:rgba(255,255,255,0.15);
  display:none;
}

/* ─── BRUSH SIZE DISPLAY ─── */
#brushInfo {
  position:absolute; left:16px; bottom:90px;
  background:rgba(10,10,15,.8); backdrop-filter:blur(12px);
  border:1px solid var(--border); border-radius:10px; padding:8px 14px;
  font-size:.65rem; color:var(--muted); z-index:100;
}
</style>
</head>
<body>

<!-- ─── SPLASH ─── -->
<div class="screen" id="splash">
  <div class="splash-logo">Air<span>Draw</span></div>
  <div class="splash-sub">Beyond the Brush</div>
  <button class="splash-btn" id="startBtn">✦ Open Camera</button>
  <div class="splash-hint">
    ☞ Index finger to draw<br>
    ✋ High-five (open hand) to erase / drag text
  </div>
</div>

<!-- ─── MAIN DRAW SCREEN ─── -->
<div class="screen hidden" id="main">
  <video id="videoEl" playsinline autoplay muted></video>
  <canvas id="templateCanvas"></canvas>
  <canvas id="drawCanvas"></canvas>
  <canvas id="handCanvas"></canvas>

  <div id="cursorDot"></div>
  <div id="eraserRing"></div>
  <div id="eraseFlash"></div>

  <!-- HUD -->
  <div id="hud">
    <span id="handStatus" class="status">⬤ READY</span>
    <span>|</span>
    <span id="modeLabel" class="mode-label">DRAW</span>
    <span>|</span>
    <span id="gestureLabel" style="color:var(--muted)">—</span>
  </div>

  <!-- Top Right Buttons -->
  <div id="topRight">
    <button class="icon-btn" id="galleryBtn" title="Gallery">🖼</button>
    <button class="icon-btn" id="clearBtn" title="Clear canvas">🗑</button>
    <button class="icon-btn" id="saveBtn" title="Save to gallery">💾</button>
  </div>

  <!-- Gesture Hint -->
  <div id="gestureHint"></div>

  <!-- Text Controls -->
  <div id="textControls" id="textControls">
    <div style="font-size:.65rem;color:var(--muted);letter-spacing:2px">TEXT MODE</div>
    <input id="textInput" type="text" placeholder="Type your text…" maxlength="50">
    <div id="textColorRow">
      <div class="tc-color active" style="background:#ffffff" data-color="#ffffff"></div>
      <div class="tc-color" style="background:#ff2d78" data-color="#ff2d78"></div>
      <div class="tc-color" style="background:#ffe94a" data-color="#ffe94a"></div>
      <div class="tc-color" style="background:#2d8bff" data-color="#2d8bff"></div>
      <div class="tc-color" style="background:#2dff9a" data-color="#2dff9a"></div>
    </div>
    <button class="add-text-btn" id="addTextBtn">+ Add Text</button>
  </div>

  <!-- Shape Controls -->
  <div id="shapeControls">
    <div style="font-size:.65rem;color:var(--muted);letter-spacing:2px">SHAPE MODE</div>
    <div id="shapeRow" style="display:flex;gap:8px;margin-top:8px">
      <button class="shape-btn active" data-shape="square" style="flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,0.1);color:var(--text);font-size:.7rem;cursor:pointer">□ Square</button>
      <button class="shape-btn" data-shape="rectangle" style="flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,0.1);color:var(--text);font-size:.7rem;cursor:pointer">▭ Rect</button>
      <button class="shape-btn" data-shape="triangle" style="flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,0.1);color:var(--text);font-size:.7rem;cursor:pointer">△ Tri</button>
    </div>
    <div style="margin-top:10px;font-size:.6rem;color:var(--muted);text-align:center">☝ Index to start, drag to size<br>✌ Peace sign to place</div>
  </div>

  <!-- Done Editing Button -->
  <button id="doneEditingBtn">✓ Done Editing</button>

  <!-- Brush Info -->
  <div id="brushInfo"><span id="sizeLabel">SIZE</span>: <span id="sizeDisplay">8</span>px</div>

  <!-- Toolbar -->
  <div id="toolbar">
    <!-- Colors -->
    <div class="color-btn active" style="background:#111111" data-color="black" title="Black"></div>
    <div class="color-btn" style="background:#ff2d78" data-color="pink" title="Pink"></div>
    <div class="color-btn" style="background:#ffe94a" data-color="yellow" title="Yellow"></div>
    <div class="color-btn" style="background:#2d8bff" data-color="blue" title="Blue"></div>
    <div class="color-btn" style="background:#2dff9a" data-color="green" title="Green"></div>
    <div class="tool-sep"></div>
    <!-- Size -->
    <button class="size-btn" id="sizeDown">−</button>
    <button class="size-btn" id="sizeUp">+</button>
    <div class="tool-sep"></div>
    <!-- Modes -->
    <button class="tool-btn active" id="drawModeBtn">✏ DRAW</button>
    <button class="tool-btn" id="textModeBtn">T TEXT</button>
    <button class="tool-btn" id="shapeModeBtn">◇ SHAPE</button>
    <button class="tool-btn" id="eraserBtn" style="color:var(--yellow)">◎ ERASE</button>
  </div>
</div>

<!-- ─── GALLERY ─── -->
<div class="screen hidden" id="gallery">
  <div class="gallery-header">
    <div class="gallery-title">Gallery</div>
    <button class="back-btn" id="backBtn">← Back</button>
  </div>
  <div class="gallery-grid" id="galleryGrid">
    <div class="gallery-empty">No artwork saved yet.<br>Draw something and hit 💾</div>
  </div>
</div>

<!-- ─── LOADING ─── -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Initializing hand tracking…</div>
</div>

<!-- ─── TOAST ─── -->
<div id="toast"></div>
<div id="saveFlash"></div>

<!-- ─── TEXT LAYER ─── -->
<div id="textLayer"></div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const state = {
  mode: 'draw',         // 'draw' | 'text' | 'shape' | 'eraser'
  color: '#111111',
  brushSize: 8,
  eraseRadius: 40,
  isDrawing: false,
  lastX: null, lastY: null,
  gesture: 'none',      // 'draw' | 'erase' | 'peace' | 'none'
  gestureHistory: [],
  prevGesture: 'none',
  handsDetected: 0,
  gallery: [],          // {dataURL, timestamp}[]
  textItems: [],        // {id, text, x, y, color, el}[]
  selectedText: null,
  textColor: '#ffffff',
  textDragActive: false,
  textDragId: null,
  textDragOffX: 0, textDragOffY: 0,
  editingText: null,    // Currently editing text item
  shapeItems: [],       // {id, type, x, y, width, height, color, el, isPlaced}[]
  selectedShape: null,
  currentShape: 'square', // 'square' | 'rectangle' | 'triangle'
  shapeDragActive: false,
  shapeDragId: null,
  shapeDragOffX: 0, shapeDragOffY: 0,
  shapeStartX: null, shapeStartY: null,
};

// DOM refs
const splash        = document.getElementById('splash');
const mainScreen    = document.getElementById('main');
const galleryScreen = document.getElementById('gallery');
const startBtn      = document.getElementById('startBtn');
const videoEl       = document.getElementById('videoEl');
const drawCanvas    = document.getElementById('drawCanvas');
const handCanvas    = document.getElementById('handCanvas');
const templateCanvas= document.getElementById('templateCanvas');
const dCtx          = drawCanvas.getContext('2d');
const hCtx          = handCanvas.getContext('2d');
const tCtx          = templateCanvas.getContext('2d');
const cursorDot     = document.getElementById('cursorDot');
const eraserRing    = document.getElementById('eraserRing');
const eraseFlash    = document.getElementById('eraseFlash');
const gestureHint   = document.getElementById('gestureHint');
const gestureLabel  = document.getElementById('gestureLabel');
const handStatus    = document.getElementById('handStatus');
const modeLabel     = document.getElementById('modeLabel');
const sizeDisplay   = document.getElementById('sizeDisplay');
const toast         = document.getElementById('toast');
const saveFlash     = document.getElementById('saveFlash');
const loading       = document.getElementById('loading');
const loadingText   = document.getElementById('loadingText');
const galleryGrid   = document.getElementById('galleryGrid');
const textControls  = document.getElementById('textControls');
const textInput     = document.getElementById('textInput');

// TEMPLATE CANVAS (beyondthebrush.png aesthetic)
// ═══════════════════════════════════════════════════════
function drawTemplate() {
  const w = templateCanvas.width, h = templateCanvas.height;
  tCtx.clearRect(0,0,w,h);

  // Subtle decorative frame
  tCtx.strokeStyle = 'rgba(255,45,120,0.6)';
  tCtx.lineWidth = 2;
  tCtx.strokeRect(20, 20, w-40, h-40);

  tCtx.strokeStyle = 'rgba(255,45,120,0.2)';
  tCtx.lineWidth = 1;
  tCtx.strokeRect(26, 26, w-52, h-52);

  // Corner ornaments
  const corners = [[30,30], [w-30,30], [30,h-30], [w-30,h-30]];
  corners.forEach(([cx,cy]) => {
    tCtx.fillStyle = 'rgba(255,45,120,0.7)';
    tCtx.beginPath();
    tCtx.arc(cx, cy, 4, 0, Math.PI*2);
    tCtx.fill();
  });

  // Brand watermark text (center)
  tCtx.save();
  tCtx.font = 'italic 700 48px Georgia, serif';
  tCtx.fillStyle = 'rgba(255,255,255,0.06)';
  tCtx.textAlign = 'center';
  tCtx.textBaseline = 'middle';
  tCtx.fillText('beyond the brush', w/2, h/2);
  tCtx.restore();

  // Corner label
  tCtx.save();
  tCtx.font = '500 11px monospace';
  tCtx.fillStyle = 'rgba(255,45,120,0.5)';
  tCtx.textAlign = 'left';
  tCtx.fillText('AIRDRAW · BEYOND THE BRUSH', 36, h-36);
  tCtx.restore();
}

// ═══════════════════════════════════════════════════════
// GESTURE DETECTION
// ═══════════════════════════════════════════════════════
function detectGesture(landmarks) {
  // Finger tips: thumb=4, index=8, middle=12, ring=16, pinky=20
  // MCP knuckles: index=5, middle=9, ring=13, pinky=17
  const tip = (i) => landmarks[i];
  const mcp = (i) => landmarks[i];

  const fingerExtended = (tipIdx, mcpIdx) => {
    return tip(tipIdx).y < mcp(mcpIdx).y - 0.03;
  };

  const indexExt  = fingerExtended(8,5);
  const middleExt = fingerExtended(12,9);
  const ringExt   = fingerExtended(16,13);
  const pinkyExt  = fingerExtended(20,17);
  const thumbExt  = landmarks[4].x < landmarks[3].x - 0.02 || landmarks[4].x > landmarks[3].x + 0.02;

  // High five = all 4 fingers + thumb extended
  if (indexExt && middleExt && ringExt && pinkyExt) return 'erase';
  // Peace sign = index and middle extended, ring and pinky closed
  if (indexExt && middleExt && !ringExt && !pinkyExt) return 'peace';
  // Draw = only index extended
  if (indexExt && !middleExt && !ringExt && !pinkyExt) return 'draw';
  return 'none';
}

// Smooth gesture with small history buffer
function smoothGesture(g) {
  state.gestureHistory.push(g);
  if (state.gestureHistory.length > 5) state.gestureHistory.shift();
  const counts = {};
  state.gestureHistory.forEach(x => counts[x] = (counts[x]||0)+1);
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
}

// ═══════════════════════════════════════════════════════
// DRAWING LOGIC
// ═══════════════════════════════════════════════════════

// Erase at a given point — always uses destination-out
function eraseAt(x, y) {
  const r = state.eraseRadius;
  dCtx.save();
  dCtx.globalCompositeOperation = 'destination-out';
  dCtx.beginPath();
  dCtx.arc(x, y, r, 0, Math.PI * 2);
  dCtx.fillStyle = 'rgba(0,0,0,1)';
  dCtx.fill();
  dCtx.restore();

  // Also check if we're erasing over any placed shapes and remove them
  state.shapeItems = state.shapeItems.filter(item => {
    if (!item.isPlaced || !item.el) return true;
    
    const cx = item.x + item.width / 2;
    const cy = item.y + item.height / 2;
    const d = Math.hypot(x - cx, y - cy);
    
    // If eraser overlaps with shape, remove it
    if (d < Math.max(item.width, item.height) / 2 + r) {
      item.el.remove();
      return false;
    }
    return true;
  });
}

function draw(x, y, gesture) {
  if (state.mode === 'eraser') {
    // Eraser mode — always erase regardless of hand gesture
    eraseAt(x, y);
    state.isDrawing = false;
    return;
  }

  if (gesture === 'draw') {
    if (!state.isDrawing) {
      state.isDrawing = true;
      state.lastX = x; state.lastY = y;
      return;
    }
    dCtx.globalCompositeOperation = 'source-over';
    dCtx.strokeStyle = state.color;
    dCtx.lineWidth = state.brushSize;
    dCtx.lineCap = 'round';
    dCtx.lineJoin = 'round';
    dCtx.beginPath();
    dCtx.moveTo(state.lastX, state.lastY);
    dCtx.lineTo(x, y);
    dCtx.stroke();
    state.lastX = x; state.lastY = y;

  } else if (gesture === 'erase') {
    // High-five gesture = erase
    state.isDrawing = false;
    eraseAt(x, y);

  } else {
    state.isDrawing = false;
    state.lastX = null; state.lastY = null;
  }
}

// ═══════════════════════════════════════════════════════
// TEXT DRAG
// ═══════════════════════════════════════════════════════
function handleTextDrag(x, y, gesture) {
  if (gesture === 'erase') {
    // High five = pick up nearest text
    if (!state.textDragActive) {
      let closest = null, minDist = 80;
      state.textItems.forEach(item => {
        const rect = item.el.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        const d = Math.hypot(x - cx, y - cy);
        if (d < minDist) { minDist = d; closest = item; }
      });
      if (closest) {
        state.textDragActive = true;
        state.textDragId = closest.id;
        const rect = closest.el.getBoundingClientRect();
        state.textDragOffX = x - rect.left;
        state.textDragOffY = y - rect.top;
        closest.el.classList.add('selected');
        showHint('✋ Dragging text — open hand to move');
      }
    } else {
      // Move the text
      const item = state.textItems.find(t => t.id === state.textDragId);
      if (item) {
        const nx = x - state.textDragOffX;
        const ny = y - state.textDragOffY;
        item.x = nx; item.y = ny;
        item.el.style.left = nx + 'px';
        item.el.style.top  = ny + 'px';
      }
    }
  } else {
    // Release
    if (state.textDragActive) {
      const item = state.textItems.find(t => t.id === state.textDragId);
      if (item) item.el.classList.remove('selected');
    }
    state.textDragActive = false;
    state.textDragId = null;
  }
}

// ═══════════════════════════════════════════════════════
// HAND TRACKING
// ═══════════════════════════════════════════════════════
let handsModel;

async function initHandTracking() {
  showLoading('Loading hand tracking model…');
  handsModel = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  handsModel.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7,
  });

  handsModel.onResults(onHandResults);

  const camera = new Camera(videoEl, {
    onFrame: async () => { await handsModel.send({image: videoEl}); },
    width: 1280, height: 720,
  });
  await camera.start();
  hideLoading();
  showToast('Hand tracking ready ✓');
}

function onHandResults(results) {
  const w = handCanvas.width, h = handCanvas.height;
  hCtx.clearRect(0, 0, w, h);

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    state.handsDetected = 0;
    handStatus.textContent = '⬤ WAITING';
    handStatus.style.color = 'var(--muted)';
    state.gesture = 'none';
    state.isDrawing = false;
    gestureLabel.textContent = '—';
    cursorDot.style.display = 'none';
    eraserRing.style.display = 'none';
    eraseFlash.style.display = 'none';
    return;
  }

  state.handsDetected = results.multiHandLandmarks.length;
  handStatus.textContent = '⬤ DETECTED';
  handStatus.style.color = 'var(--green)';

  const landmarks = results.multiHandLandmarks[0];
  // Mirror X because video is mirrored
  const mirroredLandmarks = landmarks.map(l => ({...l, x: 1 - l.x}));

  const rawGesture = detectGesture(mirroredLandmarks);
  const gesture = smoothGesture(rawGesture);
  state.gesture = gesture;

  // Index finger tip — used for drawing
  const tip = mirroredLandmarks[8];
  const px = tip.x * w;
  const py = tip.y * h;

  // Palm center — average of wrist(0) + knuckles(5,9,13,17) — used for erasing
  const palmPts = [0, 5, 9, 13, 17].map(i => mirroredLandmarks[i]);
  const palmX = (palmPts.reduce((s,p) => s + p.x, 0) / palmPts.length) * w;
  const palmY = (palmPts.reduce((s,p) => s + p.y, 0) / palmPts.length) * h;

  // Decide active point and what to show
  const isErasing = state.mode === 'eraser' || gesture === 'erase';
  const activeX = isErasing ? palmX : px;
  const activeY = isErasing ? palmY : py;
  const r = state.eraseRadius;

  // ── Cursor dot (draw mode) ──
  if (isErasing) {
    cursorDot.style.display = 'none';
    // Eraser ring
    eraserRing.style.display = 'block';
    eraserRing.style.left   = activeX + 'px';
    eraserRing.style.top    = activeY + 'px';
    eraserRing.style.width  = (r * 2) + 'px';
    eraserRing.style.height = (r * 2) + 'px';
    // Inner fill flash
    eraseFlash.style.display = 'block';
    eraseFlash.style.left   = activeX + 'px';
    eraseFlash.style.top    = activeY + 'px';
    eraseFlash.style.width  = (r * 2) + 'px';
    eraseFlash.style.height = (r * 2) + 'px';
  } else {
    eraserRing.style.display = 'none';
    eraseFlash.style.display = 'none';
    cursorDot.style.display = 'block';
    cursorDot.style.left   = px + 'px';
    cursorDot.style.top    = py + 'px';
    cursorDot.style.background = state.color;
    cursorDot.style.width  = (state.brushSize + 4) + 'px';
    cursorDot.style.height = (state.brushSize + 4) + 'px';
  }

  // Gesture label
  const gLabels = { draw:'☝ DRAWING', erase:'✋ ERASING', peace:'✌ PEACE', none:'✊ IDLE' };
  gestureLabel.textContent = state.mode === 'eraser' ? '◎ ERASER ON' : (gLabels[gesture] || '—');

  // Draw hand skeleton
  drawHandSkeleton(mirroredLandmarks, gesture, w, h, isErasing, palmX, palmY, r);

  // Route to mode
  if (state.mode === 'text') {
    handleTextDrag(activeX, activeY, gesture);
    state.isDrawing = false;
  } else if (state.mode === 'shape') {
    handleShapeDrag(activeX, activeY, gesture);
    state.isDrawing = false;
  } else {
    draw(activeX, activeY, gesture);
  }
}

function drawHandSkeleton(lm, gesture, w, h, isErasing, palmX, palmY, r) {
  const color = isErasing ? 'rgba(255,220,220,0.75)'
              : gesture === 'draw' ? 'rgba(255,45,120,0.75)'
              : 'rgba(107,107,138,0.5)';
  const connections = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20]];
  hCtx.strokeStyle = color;
  hCtx.lineWidth = 2;
  connections.forEach(([a,b]) => {
    hCtx.beginPath();
    hCtx.moveTo(lm[a].x*w, lm[a].y*h);
    hCtx.lineTo(lm[b].x*w, lm[b].y*h);
    hCtx.stroke();
  });
  lm.forEach((p,i) => {
    hCtx.beginPath();
    hCtx.arc(p.x*w, p.y*h, i===8?7:3, 0, Math.PI*2);
    hCtx.fillStyle = i===8 && !isErasing ? state.color : color;
    hCtx.fill();
  });

  // When erasing: draw the erase circle on the hand canvas too for extra clarity
  if (isErasing) {
    hCtx.save();
    hCtx.beginPath();
    hCtx.arc(palmX, palmY, r, 0, Math.PI*2);
    hCtx.strokeStyle = 'rgba(255,255,255,0.6)';
    hCtx.lineWidth = 2.5;
    hCtx.setLineDash([6,4]);
    hCtx.stroke();
    hCtx.setLineDash([]);
    // Cross-hairs for precision
    hCtx.strokeStyle = 'rgba(255,255,255,0.4)';
    hCtx.lineWidth = 1;
    hCtx.beginPath();
    hCtx.moveTo(palmX - r, palmY); hCtx.lineTo(palmX + r, palmY);
    hCtx.moveTo(palmX, palmY - r); hCtx.lineTo(palmX, palmY + r);
    hCtx.stroke();
    hCtx.restore();
  }
}

document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.color = colorMap[btn.dataset.color];
  });
});

document.querySelectorAll('.tc-color').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tc-color').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.textColor = btn.dataset.color;
  });
});

document.getElementById('sizeUp').addEventListener('click', () => {
  if (state.mode === 'eraser') {
    state.eraseRadius = Math.min(100, state.eraseRadius + 8);
    sizeDisplay.textContent = state.eraseRadius;
  } else {
    state.brushSize = Math.min(40, state.brushSize + 2);
    sizeDisplay.textContent = state.brushSize;
  }
});
document.getElementById('sizeDown').addEventListener('click', () => {
  if (state.mode === 'eraser') {
    state.eraseRadius = Math.max(10, state.eraseRadius - 8);
    sizeDisplay.textContent = state.eraseRadius;
  } else {
    state.brushSize = Math.max(2, state.brushSize - 2);
    sizeDisplay.textContent = state.brushSize;
  }
});

document.getElementById('drawModeBtn').addEventListener('click', () => setMode('draw'));
document.getElementById('textModeBtn').addEventListener('click', () => setMode('text'));
document.getElementById('shapeModeBtn').addEventListener('click', () => setMode('shape'));
document.getElementById('eraserBtn').addEventListener('click', () => setMode('eraser'));

function setMode(m) {
  state.mode = m;
  modeLabel.textContent = m.toUpperCase();
  modeLabel.style.color = m === 'eraser' ? 'var(--yellow)' : 'var(--yellow)';
  document.getElementById('drawModeBtn').classList.toggle('active', m==='draw');
  document.getElementById('textModeBtn').classList.toggle('active', m==='text');
  document.getElementById('shapeModeBtn').classList.toggle('active', m==='shape');
  document.getElementById('eraserBtn').classList.toggle('active', m==='eraser');
  textControls.classList.toggle('visible', m==='text');
  shapeControls.classList.toggle('visible', m==='shape');
  // Hide eraser ring when leaving eraser mode
  if (m !== 'eraser') {
    eraserRing.style.display = 'none';
    eraseFlash.style.display = 'none';
  }
  // Cancel shape creation if leaving shape mode
  if (m !== 'shape' && state.shapeStartX !== null) {
    const item = state.shapeItems[state.shapeItems.length - 1];
    if (item && item.el && !item.isPlaced) {
      item.el.remove();
      state.shapeItems.pop();
    }
    state.shapeStartX = null;
    state.shapeStartY = null;
  }
  // Update brush info label
  const sizeLabel = document.getElementById('sizeLabel');
  if (sizeLabel) sizeLabel.textContent = m === 'eraser' ? 'ERASE' : 'SIZE';
  sizeDisplay.textContent = m === 'eraser' ? state.eraseRadius : state.brushSize;
  if (m === 'eraser') showToast('◎ Eraser mode — ✋ high-five OR move hand to erase');
  else if (m === 'text') showToast('T Text mode — ✋ high-five to drag text');
  else if (m === 'shape') showToast('◇ Shape mode — ☝ Index to start, ✌ Peace to place');
  else showToast('✏ Draw mode — ☝ index finger to draw');
}

// ═══════════════════════════════════════════════════════
// TEXT ITEMS
// ═══════════════════════════════════════════════════════
let textIdCounter = 0;

document.getElementById('addTextBtn').addEventListener('click', addText);
textInput.addEventListener('keydown', e => { if(e.key==='Enter') addText(); });

// Shape selection buttons
document.querySelectorAll('.shape-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.currentShape = btn.dataset.shape;
  });
});

function addText() {
  const txt = textInput.value.trim();
  if (!txt) return;
  const id = ++textIdCounter;
  const x = window.innerWidth/2 - 100;
  const y = window.innerHeight/2 - 20;

  const el = document.createElement('div');
  el.className = 'text-item';
  el.textContent = txt;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.style.color = state.textColor;
  el.dataset.id = id;
  el.contentEditable = 'false';
  textLayer.appendChild(el);

  const item = { id, text:txt, x, y, color:state.textColor, el };
  state.textItems.push(item);

  // Mouse drag support too
  el.addEventListener('mousedown', e => startMouseDrag(e, item));
  // Double-click to edit
  el.addEventListener('dblclick', e => {
    e.preventDefault();
    e.stopPropagation();
    startEditing(item);
  });

  textInput.value = '';
  showToast('Text added! Double-click to edit, ✋ High-five to drag');
}

// Mouse drag for text
function startMouseDrag(e, item) {
  // Don't drag if editing
  if (state.editingText === item) return;
  
  e.preventDefault();
  const startX = e.clientX - item.x;
  const startY = e.clientY - item.y;
  const onMove = (ev) => {
    item.x = ev.clientX - startX;
    item.y = ev.clientY - startY;
    item.el.style.left = item.x + 'px';
    item.el.style.top  = item.y + 'px';
  };
  const onUp = () => {
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
  };
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
}

// Text editing functions
function startEditing(item) {
  if (state.editingText) {
    stopEditing();
  }
  state.editingText = item;
  item.el.contentEditable = 'true';
  item.el.classList.add('editing');
  item.el.focus();
  
  // Position done button near the text
  const rect = item.el.getBoundingClientRect();
  doneEditingBtn.style.left = (rect.left + rect.width / 2 - 50) + 'px';
  doneEditingBtn.style.top = (rect.bottom + 10) + 'px';
  doneEditingBtn.classList.add('visible');
  
  // Live update while typing
  item.el.addEventListener('input', handleTextInput);
  
  showToast('Editing text - type to update live');
}

function stopEditing() {
  if (!state.editingText) return;
  
  const item = state.editingText;
  item.el.contentEditable = 'false';
  item.el.classList.remove('editing');
  item.el.removeEventListener('input', handleTextInput);
  
  // Update stored text
  item.text = item.el.textContent;
  
  state.editingText = null;
  doneEditingBtn.classList.remove('visible');
  
  showToast('Text updated!');
}

function handleTextInput(e) {
  if (state.editingText) {
    state.editingText.text = e.target.textContent;
  }
}

// Done editing button click
doneEditingBtn.addEventListener('click', stopEditing);

// Click outside to stop editing
document.addEventListener('click', (e) => {
  if (state.editingText && !state.editingText.el.contains(e.target) && e.target !== doneEditingBtn) {
    stopEditing();
  }
});

// Escape key to stop editing
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && state.editingText) {
    stopEditing();
  }
});

// ═══════════════════════════════════════════════════════
// SHAPE ITEMS
// ═══════════════════════════════════════════════════════
let shapeIdCounter = 0;

function handleShapeDrag(x, y, gesture) {
  // If peace sign detected and we have an active shape being created, place it permanently
  if (gesture === 'peace' && state.shapeStartX !== null) {
    placeShape();
    state.shapeStartX = null;
    state.shapeStartY = null;
    return;
  }

  if (gesture === 'draw') {
    // Index finger = start or resize shape
    if (state.shapeStartX === null) {
      // Start new shape
      state.shapeStartX = x;
      state.shapeStartY = y;
      createTempShape(x, y);
    } else {
      // Resize current shape
      updateTempShape(x, y);
    }
  } else if (gesture === 'erase') {
    // High five = drag existing placed shapes
    if (!state.shapeDragActive) {
      let closest = null, minDist = 80;
      state.shapeItems.filter(s => s.isPlaced && s.el).forEach(item => {
        const cx = item.x + item.width / 2;
        const cy = item.y + item.height / 2;
        const d = Math.hypot(x - cx, y - cy);
        if (d < minDist) { minDist = d; closest = item; }
      });
      if (closest) {
        state.shapeDragActive = true;
        state.shapeDragId = closest.id;
        state.shapeDragOffX = x - closest.x;
        state.shapeDragOffY = y - closest.y;
        closest.el.classList.add('selected');
        showHint('✋ Dragging shape — open hand to move');
      }
    } else {
      // Move the shape
      const item = state.shapeItems.find(s => s.id === state.shapeDragId);
      if (item && item.el) {
        // Clear previous shape from canvas
        clearShapeFromCanvas(item);
        
        const dx = x - state.shapeDragOffX - item.x;
        const dy = y - state.shapeDragOffY - item.y;
        
        const nx = x - state.shapeDragOffX;
        const ny = y - state.shapeDragOffY;
        item.x = nx; item.y = ny;
        item.el.style.left = nx + 'px';
        item.el.style.top = ny + 'px';
        
        // Update start/end coordinates for lines
        if (item.type === 'line' && item.startX !== undefined) {
          item.startX += dx;
          item.startY += dy;
          item.endX += dx;
          item.endY += dy;
          // Redraw the element with updated coordinates
          drawShapeOnElement(item.el, item);
        }
        
        // Redraw at new position
        drawShapeOnCanvas(item);
      }
    }
  } else {
    // Release drag
    if (state.shapeDragActive) {
      const item = state.shapeItems.find(s => s.id === state.shapeDragId);
      if (item && item.el) item.el.classList.remove('selected');
    }
    state.shapeDragActive = false;
    state.shapeDragId = null;
  }
}

function createTempShape(x, y) {
  const id = ++shapeIdCounter;
  const el = document.createElement('div');
  el.className = 'shape-item';
  el.style.position = 'absolute';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.width = '0px';
  el.style.height = '0px';
  el.style.border = `3px solid ${state.color}`;
  el.style.pointerEvents = 'all';
  el.style.cursor = 'grab';
  el.dataset.id = id;
  textLayer.appendChild(el);

  const item = { id, type: state.currentShape, x, y, width: 0, height: 0, color: state.color, el, isPlaced: false };
  state.shapeItems.push(item);
  drawShapeOnElement(el, item);
}

function updateTempShape(x, y) {
  const item = state.shapeItems[state.shapeItems.length - 1];
  if (!item || item.isPlaced) return;

  if (item.type === 'line') {
    // For line, keep start position fixed, extend to cursor
    const width = x - state.shapeStartX;
    const height = y - state.shapeStartY;
    
    item.width = Math.abs(width);
    item.height = Math.abs(height);
    // Keep original start position
    item.x = state.shapeStartX;
    item.y = state.shapeStartY;
    
    // For negative direction, we need to adjust the element position
    const actualX = width < 0 ? x : state.shapeStartX;
    const actualY = height < 0 ? y : state.shapeStartY;
    
    item.el.style.left = actualX + 'px';
    item.el.style.top = actualY + 'px';
    item.el.style.width = item.width + 'px';
    item.el.style.height = item.height + 'px';
    
    // Store the actual start point for drawing
    item.startX = state.shapeStartX;
    item.startY = state.shapeStartY;
    item.endX = x;
    item.endY = y;
  } else {
    // For other shapes, use bounding box
    const width = Math.abs(x - state.shapeStartX);
    const height = Math.abs(y - state.shapeStartY);
    const newX = Math.min(x, state.shapeStartX);
    const newY = Math.min(y, state.shapeStartY);

    item.width = width;
    item.height = height;
    item.x = newX;
    item.y = newY;

    item.el.style.left = newX + 'px';
    item.el.style.top = newY + 'px';
    item.el.style.width = width + 'px';
    item.el.style.height = height + 'px';
  }

  drawShapeOnElement(item.el, item);
}

function placeShape() {
  const item = state.shapeItems[state.shapeItems.length - 1];
  if (!item || item.isPlaced) return;

  item.isPlaced = true;
  item.el.classList.add('placed');
  
  // Draw the shape permanently on the canvas
  drawShapeOnCanvas(item);
  
  // Keep the DOM element for dragging
  showToast('Shape placed! Use eraser to remove');
}

function drawShapeOnElement(el, item) {
  el.innerHTML = '';
  el.style.background = 'transparent';
  
  if (item.type === 'line') {
    // For line, use the actual start and end coordinates
    const x1 = item.startX !== undefined ? (item.startX - item.x) : 0;
    const y1 = item.startY !== undefined ? (item.startY - item.y) : 0;
    const x2 = item.endX !== undefined ? (item.endX - item.x) : item.width;
    const y2 = item.endY !== undefined ? (item.endY - item.y) : item.height;
    
    // Calculate the bounding box for the SVG
    const svgX = Math.min(x1, x2);
    const svgY = Math.min(y1, y2);
    const svgWidth = Math.abs(x2 - x1) || 1;
    const svgHeight = Math.abs(y2 - y1) || 1;
    
    el.innerHTML = `<svg width="100%" height="100%" style="position:absolute;top:0;left:0;overflow:visible">
      <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${item.color}" stroke-width="3" stroke-linecap="round"/>
    </svg>`;
    el.style.border = 'none';
  } else if (item.type === 'square') {
    const size = Math.max(item.width, item.height);
    el.style.width = size + 'px';
    el.style.height = size + 'px';
  } else if (item.type === 'triangle') {
    el.innerHTML = `<svg width="100%" height="100%" style="position:absolute;top:0;left:0">
      <polygon points="${item.width/2},0 ${item.width},${item.height} 0,${item.height}" fill="none" stroke="${item.color}" stroke-width="3"/>
    </svg>`;
    el.style.border = 'none';
  }
  // Rectangle uses default border styling
}

function drawShapeOnCanvas(item) {
  dCtx.globalCompositeOperation = 'source-over';
  dCtx.strokeStyle = item.color;
  dCtx.lineWidth = state.brushSize;
  dCtx.lineCap = 'round';
  dCtx.lineJoin = 'round';

  if (item.type === 'line') {
    dCtx.beginPath();
    dCtx.moveTo(item.startX || state.shapeStartX, item.startY || state.shapeStartY);
    dCtx.lineTo(item.endX || (item.x + item.width), item.endY || (item.y + item.height));
    dCtx.stroke();
  } else if (item.type === 'square') {
    const size = Math.max(item.width, item.height);
    dCtx.strokeRect(item.x, item.y, size, size);
  } else if (item.type === 'rectangle') {
    dCtx.strokeRect(item.x, item.y, item.width, item.height);
  } else if (item.type === 'triangle') {
    dCtx.beginPath();
    dCtx.moveTo(item.x + item.width / 2, item.y);
    dCtx.lineTo(item.x + item.width, item.y + item.height);
    dCtx.lineTo(item.x, item.y + item.height);
    dCtx.closePath();
    dCtx.stroke();
  }
}

function clearShapeFromCanvas(item) {
  const padding = state.brushSize + 4;
  
  if (item.type === 'line') {
    // For lines, clear a bounding box around the entire line
    const minX = Math.min(item.startX || item.x, item.endX || (item.x + item.width));
    const minY = Math.min(item.startY || item.y, item.endY || (item.y + item.height));
    const maxX = Math.max(item.startX || item.x, item.endX || (item.x + item.width));
    const maxY = Math.max(item.startY || item.y, item.endY || (item.y + item.height));
    
    const clearX = minX - padding;
    const clearY = minY - padding;
    const clearW = (maxX - minX) + padding * 2;
    const clearH = (maxY - minY) + padding * 2;
    
    dCtx.save();
    dCtx.globalCompositeOperation = 'destination-out';
    dCtx.fillRect(clearX, clearY, clearW, clearH);
    dCtx.restore();
  } else {
    // For other shapes, use the bounding box
    const clearX = item.x - padding;
    const clearY = item.y - padding;
    const clearW = item.width + padding * 2;
    const clearH = item.height + padding * 2;
    
    dCtx.save();
    dCtx.globalCompositeOperation = 'destination-out';
    dCtx.fillRect(clearX, clearY, clearW, clearH);
    dCtx.restore();
  }
}

// ═══════════════════════════════════════════════════════
// SAVE / GALLERY
// ═══════════════════════════════════════════════════════
document.getElementById('saveBtn').addEventListener('click', saveArtwork);
document.getElementById('clearBtn').addEventListener('click', clearCanvas);
document.getElementById('galleryBtn').addEventListener('click', () => showScreen('gallery'));
document.getElementById('backBtn').addEventListener('click', () => showScreen('main'));

function clearCanvas() {
  dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  state.textItems.forEach(item => item.el.remove());
  state.textItems = [];
  state.shapeItems.forEach(item => { if(item.el) item.el.remove(); });
  state.shapeItems = [];
  showToast('Canvas cleared');
}

async function saveArtwork() {
  // Flash
  saveFlash.style.opacity = '1';
  setTimeout(() => saveFlash.style.opacity = '0', 200);

  const w = drawCanvas.width, h = drawCanvas.height;
  const offscreen = document.createElement('canvas');
  offscreen.width = w; offscreen.height = h;
  const ctx = offscreen.getContext('2d');

  // 1. Template image background
  ctx.drawImage(templateImg, 0, 0, w, h);

  // 2. Drawing
  ctx.drawImage(drawCanvas, 0, 0);

  // 3. Shape items
  state.shapeItems.filter(s => s.isPlaced).forEach(item => {
    ctx.strokeStyle = item.color;
    ctx.lineWidth = state.brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    if (item.type === 'square') {
      const size = Math.max(item.width, item.height);
      ctx.strokeRect(item.x, item.y, size, size);
    } else if (item.type === 'rectangle') {
      ctx.strokeRect(item.x, item.y, item.width, item.height);
    } else if (item.type === 'triangle') {
      ctx.beginPath();
      ctx.moveTo(item.x + item.width / 2, item.y);
      ctx.lineTo(item.x + item.width, item.y + item.height);
      ctx.lineTo(item.x, item.y + item.height);
      ctx.closePath();
      ctx.stroke();
    }
  });

  // 4. Text items
  state.textItems.forEach(item => {
    ctx.font = 'bold 28px Space Mono, monospace';
    ctx.fillStyle = item.color;
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 8;
    ctx.fillText(item.text, item.x, item.y + 28);
    ctx.shadowBlur = 0;
  });

  const dataURL = offscreen.toDataURL('image/png');
  const ts = new Date().toLocaleTimeString();
  
  // Save full state for loading back
  const drawingData = drawCanvas.toDataURL();
  const textItemsData = state.textItems.map(item => ({
    id: item.id,
    text: item.text,
    x: item.x,
    y: item.y,
    color: item.color
  }));
  const shapeItemsData = state.shapeItems.filter(s => s.isPlaced).map(item => ({
    id: item.id,
    type: item.type,
    x: item.x,
    y: item.y,
    width: item.width,
    height: item.height,
    color: item.color,
    isPlaced: item.isPlaced
  }));
  
  state.gallery.unshift({ 
    dataURL, 
    timestamp: ts, 
    id: Date.now(),
    drawingData,
    textItemsData,
    shapeItemsData
  });
  renderGallery();
  showToast('Saved to gallery! 🎨');
}

function renderGallery() {
  if (state.gallery.length === 0) {
    galleryGrid.innerHTML = '<div class="gallery-empty">No artwork saved yet.<br>Draw something and hit 💾</div>';
    return;
  }
  galleryGrid.innerHTML = '';
  state.gallery.forEach(item => {
    const card = document.createElement('div');
    card.className = 'gallery-card';
    card.innerHTML = `
      <img class="gallery-thumb" src="${item.dataURL}" alt="Artwork" data-id="${item.id}">
      <div class="gallery-actions">
        <button class="load-btn" data-id="${item.id}">📂 Load</button>
        <button class="dl-btn" data-id="${item.id}" data-type="png">⬇ PNG</button>
        <button class="dl-btn pdf" data-id="${item.id}" data-type="pdf">⬇ PDF</button>
        <button class="dl-btn pptx" data-id="${item.id}" data-type="pptx">⬇ PPTX</button>
      </div>
    `;
    galleryGrid.appendChild(card);
  });

  galleryGrid.querySelectorAll('.load-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.id);
      const item = state.gallery.find(g => g.id === id);
      if (item) loadArtwork(item);
    });
  });

  galleryGrid.querySelectorAll('.dl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.id);
      const type = btn.dataset.type;
      const item = state.gallery.find(g => g.id === id);
      if (item) downloadItem(item, type);
    });
  });
}

async function downloadItem(item, type) {
  showLoading(`Exporting as ${type.toUpperCase()}…`);
  try {
    if (type === 'png') {
      const a = document.createElement('a');
      a.href = item.dataURL;
      a.download = `airdraw-${item.id}.png`;
      a.click();

    } else if (type === 'pdf') {
      const { jsPDF } = window.jspdf;
      const img = new Image();
      img.src = item.dataURL;
      await new Promise(r => img.onload = r);
      const pw = img.naturalWidth || 1280;
      const ph = img.naturalHeight || 720;
      const pdf = new jsPDF({ orientation:'landscape', unit:'px', format:[pw,ph] });
      pdf.addImage(item.dataURL, 'PNG', 0, 0, pw, ph);
      pdf.save(`airdraw-${item.id}.pdf`);

    } else if (type === 'pptx') {
      await exportPPTX(item);
    }
    showToast(`Downloaded as ${type.toUpperCase()}!`);
  } catch(e) {
    showToast('Export failed: ' + e.message);
    console.error(e);
  }
  hideLoading();
}

async function loadArtwork(item) {
  showLoading('Loading artwork…');
  
  // Clear current canvas and items
  dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  state.textItems.forEach(t => t.el.remove());
  state.textItems = [];
  state.shapeItems.forEach(s => { if(s.el) s.el.remove(); });
  state.shapeItems = [];
  
  // Load drawing canvas
  if (item.drawingData) {
    const img = new Image();
    img.onload = () => {
      dCtx.drawImage(img, 0, 0);
    };
    img.src = item.drawingData;
  }
  
  // Load text items
  if (item.textItemsData && item.textItemsData.length > 0) {
    item.textItemsData.forEach(data => {
      const el = document.createElement('div');
      el.className = 'text-item';
      el.textContent = data.text;
      el.style.left = data.x + 'px';
      el.style.top = data.y + 'px';
      el.style.color = data.color;
      textLayer.appendChild(el);
      
      state.textItems.push({
        id: data.id,
        text: data.text,
        x: data.x,
        y: data.y,
        color: data.color,
        el: el
      });
    });
  }
  
  // Load shape items
  if (item.shapeItemsData && item.shapeItemsData.length > 0) {
    item.shapeItemsData.forEach(data => {
      const el = document.createElement('div');
      el.className = 'shape-item';
      el.style.position = 'absolute';
      el.style.left = data.x + 'px';
      el.style.top = data.y + 'px';
      el.style.width = data.width + 'px';
      el.style.height = data.height + 'px';
      el.style.border = `3px solid ${data.color}`;
      el.style.pointerEvents = 'all';
      el.style.cursor = 'grab';
      el.dataset.id = data.id;
      textLayer.appendChild(el);
      
      const item = {
        id: data.id,
        type: data.type,
        x: data.x,
        y: data.y,
        width: data.width,
        height: data.height,
        color: data.color,
        el: el,
        isPlaced: data.isPlaced
      };
      state.shapeItems.push(item);
      drawShapeOnElement(el, item);
    });
  }
  
  hideLoading();
  showScreen('main');
  showToast('Artwork loaded! Text is editable ✓');
}

  [splash, mainScreen, galleryScreen].forEach(s => s.classList.add('hidden'));

  map[name].classList.remove('hidden');
