<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AirDraw">
<link rel="manifest" href="manifest.json">
<title>AirDraw — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ─── LOGIN SCREEN ─── -->
<div class="screen" id="loginScreen">
  <div class="login-container">
    <div class="splash-logo">Air<span>Draw</span></div>
    <div class="splash-sub">Beyond the Brush</div>
    
    <div class="login-form">
      <h2>Login to Your Gallery</h2>
      <form id="loginForm">
        <div class="input-group">
          <input type="text" id="identifier" placeholder="Email or Username" required>
        </div>
        <div class="input-group">
          <input type="password" id="password" placeholder="Password" required>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">🔓 Login</button>
      </form>
      <div id="loginError" class="error-message" style="display: none;"></div>
      <div class="login-hint">
        Enter your email/username and password to access your personal gallery
      </div>
    </div>
  </div>
</div>

<!-- ─── LOADING ─── -->
<div id="loading" style="display: none;">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Logging in…</div>
</div>

<!-- ─── TOAST ─── -->
<div id="toast"></div>

<script>
// Login functionality
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const identifier = document.getElementById('identifier').value;
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('loginError');
  const loginBtn = document.getElementById('loginBtn');
  
  // Show loading
  loginBtn.disabled = true;
  loginBtn.textContent = '🔄 Logging in...';
  errorDiv.style.display = 'none';
  
  try {
    const response = await fetch('http://localhost:5000/api/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ identifier, password })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      // Store token and user info
      localStorage.setItem('airdraw_token', data.token);
      localStorage.setItem('airdraw_user', JSON.stringify(data.user));
      
      // Redirect to airdraw.html
      window.location.href = 'airdraw.html';
    } else {
      errorDiv.textContent = data.error || 'Login failed';
      errorDiv.style.display = 'block';
    }
  } catch (error) {
    errorDiv.textContent = 'Network error. Please try again.';
    errorDiv.style.display = 'block';
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = '� Login';
  }
});

// Check if already logged in
window.addEventListener('load', () => {
  const token = localStorage.getItem('airdraw_token');
  if (token) {
    // Redirect to airdraw.html if already logged in
    window.location.href = 'airdraw.html';
  }
});

// Simple toast function for login page
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.style.display = 'block';
  toast.style.opacity = '1';
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => {
      toast.style.display = 'none';
    }, 300);
  }, 3000);
}
</script>
</body>
</html>
